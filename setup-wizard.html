<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعداد النظام — WeB Ora</title>
  <link rel="icon" type="image/png" href="img/mark.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#F57C20;--primary-h:#e06b10;
      --green:#34D399;--green-bg:rgba(52,211,153,.12);--green-border:rgba(52,211,153,.3);
      --blue:#818CF8;--blue-bg:rgba(99,102,241,.12);--blue-border:rgba(99,102,241,.3);
      --orange:#F57C20;--orange-bg:rgba(245,124,32,.1);--orange-border:rgba(245,124,32,.3);
      --red:#EF4444;
      --bg:#0f172a;--surface:#1C2230;--border:#2D3748;
      --text:#F3F4F6;--muted:#9CA3AF;
    }
    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a 0%,#1C2230 60%,#0f172a 100%);
      font-family:'Cairo',sans-serif;
      display:flex;align-items:center;justify-content:center;
      padding:24px;color:var(--text);
    }
    .wrap{width:100%;max-width:560px;}
    .logo-row{text-align:center;margin-bottom:24px;}
    .logo-row img{width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(245,124,32,.5));}
    .logo-row h1{font-size:22px;font-weight:800;margin-top:12px;color:#fff;}
    .logo-row p{font-size:13px;color:var(--muted);margin-top:4px;}

    /* progress */
    .steps-bar{display:flex;gap:8px;margin-bottom:28px;align-items:center;}
    .step-dot{
      width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:800;flex-shrink:0;
      border:2px solid var(--border);
      background:var(--surface);color:var(--muted);
      transition:all .3s;
    }
    .step-dot.active{border-color:var(--primary);color:var(--primary);background:var(--orange-bg);}
    .step-dot.done{border-color:var(--green);color:var(--green);background:var(--green-bg);}
    .step-line{flex:1;height:2px;background:var(--border);border-radius:2px;transition:background .3s;}
    .step-line.done{background:var(--green);}

    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:32px;margin-bottom:16px;
    }
    .card-title{
      font-size:18px;font-weight:800;margin-bottom:6px;
      display:flex;align-items:center;gap:10px;
    }
    .card-title svg{flex-shrink:0;}
    .card-desc{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7;}

    .field{margin-bottom:16px;}
    .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
    .input{
      width:100%;padding:10px 14px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;
      outline:none;transition:border-color .2s;
    }
    .input:focus{border-color:var(--primary);}
    .input::placeholder{color:#4B5563;}

    .option-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
    .option-card{
      border:2px solid var(--border);border-radius:12px;
      padding:14px 16px;cursor:pointer;transition:all .2s;
      display:flex;align-items:flex-start;gap:12px;
    }
    .option-card:hover{border-color:var(--primary);background:rgba(245,124,32,.05);}
    .option-card.selected{border-color:var(--primary);background:rgba(245,124,32,.08);}
    .option-card-radio{
      width:18px;height:18px;border-radius:50%;
      border:2px solid var(--border);
      flex-shrink:0;margin-top:2px;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s;
    }
    .option-card.selected .option-card-radio{border-color:var(--primary);}
    .option-card.selected .option-card-radio::after{
      content:"";width:8px;height:8px;border-radius:50%;background:var(--primary);display:block;
    }
    .option-card-text strong{font-size:14px;font-weight:700;display:block;margin-bottom:2px;}
    .option-card-text span{font-size:12px;color:var(--muted);}

    .account-item{
      background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:12px;padding:16px;margin-bottom:10px;position:relative;
    }
    .account-item .remove-btn{
      position:absolute;top:12px;left:12px;
      background:transparent;border:none;color:#6B7280;cursor:pointer;
      font-size:18px;line-height:1;padding:2px;
    }
    .account-item .remove-btn:hover{color:var(--red);}

    .btn{
      padding:11px 22px;border-radius:10px;font-size:14px;font-weight:800;
      border:none;cursor:pointer;font-family:'Cairo',sans-serif;
      transition:all .2s;display:inline-flex;align-items:center;gap:8px;
    }
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:hover:not(:disabled){background:var(--primary-h);}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
    .btn-outline{
      background:transparent;color:var(--muted);
      border:1px solid var(--border);
    }
    .btn-outline:hover{border-color:#6B7280;color:var(--text);}
    .btn-green{background:var(--green);color:#0f172a;}
    .btn-green:hover{background:#2cc58a;}
    .btn-full{width:100%;justify-content:center;}

    .msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:8px;}
    .msg-err{background:rgba(239,68,68,.1);color:#FCA5A5;border:1px solid rgba(239,68,68,.2);}
    .msg-ok{background:rgba(52,211,153,.1);color:#6EE7B7;border:1px solid rgba(52,211,153,.2);}
    .msg-info{background:rgba(245,124,32,.08);color:#FCD34D;border:1px solid rgba(245,124,32,.2);}

    .sql-box{
      background:#0f172a;border:1px solid var(--border);
      border-radius:12px;padding:18px;margin-top:12px;
    }
    .sql-box h4{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--green);}
    .sql-box ol{padding-right:18px;}
    .sql-box ol li{font-size:12px;color:var(--muted);padding:3px 0;line-height:1.7;}
    .sql-box a{color:var(--green);text-decoration:none;}
    .sql-box a:hover{text-decoration:underline;}

    .add-account-btn{
      width:100%;padding:10px;border-radius:10px;
      border:1px dashed var(--border);
      background:transparent;color:var(--muted);
      font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer;
      transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .add-account-btn:hover{border-color:var(--primary);color:var(--primary);}

    .done-icon{
      width:72px;height:72px;border-radius:50%;
      background:var(--green-bg);border:2px solid var(--green-border);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px;
    }

    .mode-badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;
    }
    .badge-offline{background:var(--blue-bg);color:var(--blue);}
    .badge-online{background:var(--green-bg);color:var(--green);}
    .badge-parallel{background:var(--orange-bg);color:var(--orange);}

    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .screen{animation:fadeIn .35s ease;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .8s linear infinite;display:inline-block;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <img src="img/mark.png" alt="WeB Ora">
    <h1>إعداد النظام</h1>
    <p id="mode-subtitle">جارٍ التحميل…</p>
  </div>

  <div class="steps-bar" id="steps-bar"></div>

  <div id="screen-container"></div>
</div>

<script src="config.js"></script>
<script>
/* ==============================
   الحالة العامة
============================== */
var mode = localStorage.getItem("pos_app_mode") || "offline";
var totalSteps = 1;
var currentStep = 1;
var accountsList = []; /* للتوازي */
var dbOption = ""; /* "already" | "setup" */
var supabaseUrl = "";
var supabaseKey = "";

/* ==============================
   حساب عدد الخطوات حسب الوضع
============================== */
function calcSteps() {
  if (mode === "offline")   return 1;
  if (mode === "online")    return 3; /* اتصال → قاعدة بيانات → حساب */
  if (mode === "parallel")  return 3; /* اتصال → قاعدة بيانات → حسابات */
  return 1;
}

/* ==============================
   رسم شريط التقدم
============================== */
function renderSteps(total, current) {
  var bar = document.getElementById("steps-bar");
  bar.innerHTML = "";
  for (var i = 1; i <= total; i++) {
    var dot = document.createElement("div");
    dot.className = "step-dot" + (i < current ? " done" : i === current ? " active" : "");
    dot.textContent = i < current ? "✓" : i;
    bar.appendChild(dot);
    if (i < total) {
      var line = document.createElement("div");
      line.className = "step-line" + (i < current ? " done" : "");
      bar.appendChild(line);
    }
  }
}

/* ==============================
   الشاشة 1 — بيانات الاتصال
============================== */
function screenConnection() {
  return [
    '<div class="card screen">',
    '  <div class="card-title">',
    '    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#34D399" stroke-width="2">',
    '      <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z"/>',
    '    </svg>',
    '    بيانات الاتصال بـ Supabase',
    '  </div>',
    '  <p class="card-desc">أدخل رابط مشروع Supabase ومفتاح anon key الخاص بك. يمكن إيجادهما في لوحة تحكم Supabase ← Project Settings ← API.</p>',
  '  <div class="field">',
    '    <label>رابط المشروع (Project URL)</label>',
    '    <input class="input" id="sb-url" dir="ltr" autocomplete="off" spellcheck="false" placeholder="https://xxxx.supabase.co" value="'+escHtml(supabaseUrl)+'">',
    '  </div>',
    '  <div class="field">',
    '    <label>المفتاح العام (Anon Key / Token)</label>',
    '    <input class="input" id="sb-key" dir="ltr" autocomplete="off" spellcheck="false" placeholder="eyJhbGciOi..." value="'+escHtml(supabaseKey)+'">',
    '  </div>',
    '  <div id="conn-msg"></div>',
    '  <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="validateConnection()">',
    '    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
    '    التالي',
    '  </button>',
    '</div>'
  ].join("");
}

async function validateConnection() {
  var urlEl = document.getElementById("sb-url");
  var keyEl = document.getElementById("sb-key");
  var msgEl = document.getElementById("conn-msg");
  var url = urlEl ? urlEl.value.trim() : "";
  var key = keyEl ? keyEl.value.trim() : "";

  msgEl.innerHTML = "";
  if (!url || !key) {
    msgEl.innerHTML = '<div class="msg msg-err">يرجى إدخال الرابط والمفتاح</div>';
    return;
  }
  if (!/^https:\/\/.+\.supabase\.co\/?$/.test(url.replace(/\/$/, ""))) {
    msgEl.innerHTML = '<div class="msg msg-err">يجب أن يكون الرابط بصيغة: https://xxxx.supabase.co</div>';
    return;
  }

  msgEl.innerHTML = '<div class="msg msg-info"><span class="spin">⟳</span> جارٍ التحقق من الاتصال…</div>';

  /* اختبار الاتصال */
  try {
    var testUrl = url.replace(/\/$/, "") + "/rest/v1/";
    var r = await fetch(testUrl, {
      headers: { "apikey": key, "Authorization": "Bearer " + key }
    });
    if (r.status >= 500) throw new Error("server_error");

    supabaseUrl = url.replace(/\/$/, "");
    supabaseKey = key;

    msgEl.innerHTML = '<div class="msg msg-ok">✓ تم التحقق من الاتصال بنجاح</div>';
    setTimeout(function () { goStep(2); }, 700);
  } catch (e) {
    msgEl.innerHTML = '<div class="msg msg-err">✗ تعذّر الاتصال بـ Supabase — تحقق من الرابط والمفتاح</div>';
  }
}

/* ==============================
   الشاشة 2 — إعداد قاعدة البيانات
============================== */
function screenDatabase() {
  return [
    '<div class="card screen">',
    '  <div class="card-title">',
    '    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#818CF8" stroke-width="2">',
    '      <ellipse cx="12" cy="5" rx="9" ry="3"/>',
    '      <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>',
    '    </svg>',
    '    إعداد قاعدة البيانات',
    '  </div>',
    '  <p class="card-desc">هل قمت بإعداد جداول قاعدة البيانات في Supabase مسبقاً؟</p>',
    '  <div class="option-cards">',
    '    <div class="option-card" id="opt-already" onclick="selectDbOption(\'already\')">',
    '      <div class="option-card-radio"></div>',
    '      <div class="option-card-text">',
    '        <strong>نعم، لقد قمت بإعداد قاعدة البيانات من قبل</strong>',
    '        <span>جداول النظام موجودة في مشروع Supabase الخاص بك</span>',
    '      </div>',
    '    </div>',
    '    <div class="option-card" id="opt-setup" onclick="selectDbOption(\'setup\')">',
    '      <div class="option-card-radio"></div>',
    '      <div class="option-card-text">',
    '        <strong>لا، أريد إعداد قاعدة البيانات الآن</strong>',
    '        <span>سيتم تنزيل ملف SQL يحتوي على الإعداد الشامل</span>',
    '      </div>',
    '    </div>',
    '  </div>',
    '  <div id="db-sql-section" style="display:none">',
    '    <div class="sql-box">',
    '      <h4>📋 خطوات إعداد قاعدة البيانات</h4>',
    '      <ol>',
    '        <li>اضغط زر "تنزيل ملف SQL" أدناه</li>',
    '        <li>افتح <a href="https://supabase.com/dashboard" target="_blank">لوحة تحكم Supabase</a></li>',
    '        <li>اختر مشروعك ← SQL Editor ← New query</li>',
    '        <li>الصق محتوى الملف ثم اضغط Run</li>',
    '        <li>بعد الانتهاء، عد هنا واضغط "تم الإعداد"</li>',
    '      </ol>',
    '    </div>',
    '    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">',
    '      <button class="btn btn-green" onclick="downloadSQL()">',
    '        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    '        تنزيل ملف SQL',
    '      </button>',
    '      <button class="btn btn-outline" onclick="goStep(3)">تم الإعداد ← متابعة</button>',
    '    </div>',
    '  </div>',
    '  <div id="db-msg"></div>',
    '  <div id="db-already-btn" style="display:none;margin-top:16px">',
    '    <button class="btn btn-primary btn-full" onclick="goStep(3)">',
    '      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
    '      التالي',
    '    </button>',
    '  </div>',
    '</div>'
  ].join("");
}

function selectDbOption(opt) {
  dbOption = opt;
  document.getElementById("opt-already").className = "option-card" + (opt === "already" ? " selected" : "");
  document.getElementById("opt-setup").className   = "option-card" + (opt === "setup"   ? " selected" : "");
  document.getElementById("db-sql-section").style.display  = opt === "setup"   ? "block" : "none";
  document.getElementById("db-already-btn").style.display  = opt === "already" ? "block" : "none";
  document.getElementById("db-msg").innerHTML = "";
}

function downloadSQL() {
  /* تنزيل ملف supabase_migrations.sql */
  var a = document.createElement("a");
  a.href = "supabase_migrations.sql";
  a.download = "WeB-Ora-DB-Setup.sql";
  document.body.appendChild(a);
  a.click();
  a.remove();
  document.getElementById("db-msg").innerHTML = '<div class="msg msg-ok">✓ تم تنزيل الملف — اتبع الخطوات أعلاه ثم اضغط "تم الإعداد"</div>';
}

/* ==============================
   الشاشة 3 — إعداد الحساب (Offline / Online)
============================== */

    '      <path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>',
    '      <path stroke-linecap="round" stroke-linejoin="round" d="M23 21v-2a4 4 0 0 0-3-3.87"/><path stroke-linecap="round" stroke-linejoin="round" d="M16 3.13a4 4 0 0 1 0 7.75"/>',

/* ==============================
   الشاشة 3 — إعداد الحسابات (Parallel)
============================== */
function screenAccounts() {
  return [
    '<div class="card screen">',
    '  <div class="card-title">',
    '    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#F57C20" stroke-width="2">',
    '      <path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>',
    '      <path stroke-linecap="round" stroke-linejoin="round" d="M23 21v-2a4 4 0 0 0-3-3.87"/><path stroke-linecap="round" stroke-linejoin="round" d="M16 3.13a4 4 0 0 1 0 7.75"/>',

function addAccountRow(prefill) {
  var p = prefill || {};
  var idx = Date.now();
  var item = document.createElement("div");
  item.className = "account-item";
  item.id = "account-item-" + idx;
  item.innerHTML = [
    '<button class="remove-btn" onclick="removeAccount(\''+idx+'\')" title="حذف هذا الحساب">✕</button>',
    '<div class="field"><label>اسم المستخدم</label>',
    '  <input class="input acc-user" placeholder="مثال: cashier1" value="'+escHtml(p.user||'')+'"></div>',
    '<div class="field"><label>كلمة المرور</label>',
    '  <input class="input acc-pass" type="password" placeholder="كلمة المرور"></div>',
  '<div class="field" style="margin-bottom:0"><label>الدور</label>',
    '  <select class="input acc-role">',
    '    <option value="admin"'+(p.role==="admin"?" selected":"")+'>مدير (Admin)</option>',
    '    <option value="cashier"'+(!p.role||p.role==="cashier"?" selected":"")+'>كاشير (Cashier)</option>',
    '  </select></div>'
  ].join("");
  document.getElementById("accounts-list").appendChild(item);
}

function removeAccount(idx) {
  var el = document.getElementById("account-item-" + idx);
  if (el) el.remove();
}

/* ==============================
   الشاشة النهائية — تم!
============================== */
function screenDone() {
  return [
    '<div class="card screen" style="text-align:center;padding:40px">',
    '  <div class="done-icon">',
    '    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#34D399" stroke-width="2.5">',
    '      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>',
    '    </svg>',
    '  </div>',
    '  <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">تم الإعداد بنجاح!</h2>',
    '  <p style="color:var(--muted);font-size:13px;margin-bottom:28px">سيتم توجيهك إلى صفحة تسجيل الدخول…</p>',
    '  <button class="btn btn-primary btn-full" onclick="location.href=\'login.html\'">',
    '    الدخول إلى النظام',
    '  </button>',
    '</div>'
  ].join("");
}

/* ==============================
   التنقل بين الخطوات
============================== */
function goStep(step) {
  currentStep = step;
  totalSteps = calcSteps();
  renderSteps(totalSteps, currentStep);

  var html = "";
  if (mode === "offline") {
    if (step === 1) html = screenAccount();
  } else if (mode === "online") {
    if (step === 1) html = screenConnection();
    else if (step === 2) html = screenDatabase();
    else if (step === 3) html = screenAccount();
  } else if (mode === "parallel") {
    if (step === 1) html = screenConnection();
    else if (step === 2) html = screenDatabase();
    else if (step === 3) html = screenAccounts();
  }

  if (html) {
    document.getElementById("screen-container").innerHTML = html;
    if (step === 3 && mode === "parallel") {
      addAccountRow({ role: "admin" });
    }
  }
}

/* ==============================
   حفظ الإعداد — Offline / Online
============================== */
async function finishSetup() {
  var userEl = document.getElementById("acc-user");
  var passEl = document.getElementById("acc-pass");
  var pass2El = document.getElementById("acc-pass2");
  var msgEl  = document.getElementById("acc-msg");

  var user = userEl ? userEl.value.trim() : "";
  var pass = passEl ? passEl.value : "";
  var pass2 = pass2El ? pass2El.value : "";

  msgEl.innerHTML = "";
  if (!user) { msgEl.innerHTML = '<div class="msg msg-err">أدخل اسم المستخدم</div>'; return; }
  if (pass.length < 4) { msgEl.innerHTML = '<div class="msg msg-err">كلمة المرور يجب أن تكون 4 أحرف على الأقل</div>'; return; }
  if (pass !== pass2) { msgEl.innerHTML = '<div class="msg msg-err">كلمتا المرور غير متطابقتين</div>'; return; }

  msgEl.innerHTML = '<div class="msg msg-info"><span class="spin">⟳</span> جارٍ الحفظ…</div>';

  /* حفظ إعدادات Supabase إن وجدت */
  var cfg = {};
  try { cfg = JSON.parse(localStorage.getItem("pos_config")||"{}"); } catch(e){}
  if (supabaseUrl) cfg.SUPABASE_URL = supabaseUrl;
  if (supabaseKey) cfg.SUPABASE_ANON_KEY = supabaseKey;
  localStorage.setItem("pos_config", JSON.stringify(cfg));

  /* تحديث APP_CONFIG */
  if (window.APP_CONFIG) {
    if (supabaseUrl) window.APP_CONFIG.SUPABASE_URL = supabaseUrl;
    if (supabaseKey) window.APP_CONFIG.SUPABASE_ANON_KEY = supabaseKey;
  }

  /* إنشاء المستخدم محلياً */
  var hash = await hashPw(pass);
  var users = [{ id: "1", username: user, password: hash, name: user, role: "admin", pwv: 1 }];
  localStorage.setItem("pos_auth_users", JSON.stringify(users));
  localStorage.setItem("pos_setup_done", "1");
  if (window.electronAPI && window.electronAPI.markSetupDone) { window.electronAPI.markSetupDone(); }
  localStorage.setItem("pos_setup_mode", mode);

  msgEl.innerHTML = '<div class="msg msg-ok">✓ تم الحفظ بنجاح</div>';
  setTimeout(function () {
    document.getElementById("screen-container").innerHTML = screenDone();
    document.getElementById("steps-bar").style.display = "none";
    setTimeout(function () { location.href = "login.html"; }, 3000);
  }, 600);
}

/* ==============================
   حفظ الإعداد — Parallel (متعدد الحسابات)
============================== */
async function finishSetupParallel() {
  var msgEl = document.getElementById("accs-msg");
  msgEl.innerHTML = "";

  var items = document.querySelectorAll(".account-item");
  if (items.length === 0) {
    msgEl.innerHTML = '<div class="msg msg-err">أضف حساباً واحداً على الأقل</div>';
    return;
  }

  var users = [];
  var errs = [];
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var u = it.querySelector(".acc-user").value.trim();
    var p = it.querySelector(".acc-pass").value;
    var r = it.querySelector(".acc-role").value;
    if (!u) { errs.push("الحساب " + (i+1) + ": اسم المستخدم فارغ"); continue; }
    if (p.length < 4) { errs.push("الحساب " + (i+1) + " ("+u+"): كلمة المرور قصيرة جداً"); continue; }
    var h = await hashPw(p);
    users.push({ id: String(i+1), username: u, password: h, name: u, role: r || "cashier", pwv: 1 });
  }

  if (errs.length) {
    msgEl.innerHTML = '<div class="msg msg-err">' + errs.join("<br>") + '</div>';
    return;
  }

  msgEl.innerHTML = '<div class="msg msg-info"><span class="spin">⟳</span> جارٍ الحفظ…</div>';

  /* حفظ Supabase Config */
  var cfg = {};
  try { cfg = JSON.parse(localStorage.getItem("pos_config")||"{}"); } catch(e){}
  if (supabaseUrl) cfg.SUPABASE_URL = supabaseUrl;
  if (supabaseKey) cfg.SUPABASE_ANON_KEY = supabaseKey;
  localStorage.setItem("pos_config", JSON.stringify(cfg));

  localStorage.setItem("pos_auth_users", JSON.stringify(users));
  localStorage.setItem("pos_setup_done", "1");
  if (window.electronAPI && window.electronAPI.markSetupDone) { window.electronAPI.markSetupDone(); }
  localStorage.setItem("pos_setup_mode", mode);

  msgEl.innerHTML = '<div class="msg msg-ok">✓ تم حفظ ' + users.length + ' حساب بنجاح</div>';
  setTimeout(function () {
    document.getElementById("screen-container").innerHTML = screenDone();
    document.getElementById("steps-bar").style.display = "none";
    setTimeout(function () { location.href = "login.html"; }, 3000);
  }, 600);
}

/* ==============================
   SHA-256
============================== */
async function hashPw(pw) {
  var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
}

function escHtml(s) {
  return String(s||"").replace(/[<>&"]/g, function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});
}

/* ==============================
   التهيئة الأولية
============================== */
(function init() {
  if (!mode || !["offline","online","parallel"].includes(mode)) {
    location.href = "mode-select.html";
    return;
  }
  if (localStorage.getItem("pos_setup_done") === "1") {
    location.href = "login.html";
    return;
  }

  var modeLabels = { offline:"بدون إنترنت", online:"سحابي (Supabase)", parallel:"التوازي (محلي + سحابي)" };
  var modeColors = { offline:"badge-offline", online:"badge-online", parallel:"badge-parallel" };
  document.getElementById("mode-subtitle").innerHTML =
    'إعداد الوضع: <span class="mode-badge ' + (modeColors[mode]||"") + '">' + (modeLabels[mode]||mode) + '</span>';

  totalSteps = calcSteps();
  goStep(1);
})();
</script>
