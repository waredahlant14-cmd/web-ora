<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سجلات الدفع — WeB Ora</title>
  <link rel="icon" type="image/png" href="img/mark.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="config.js"></script>
  <script src="js/mode-manager.js"></script>
  <script src="js/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/seclog.js"></script>
  <script src="js/currency.js"></script>
  <script src="js/db.js"></script>
  <script src="js/sync_queue.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/online.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/nav-extend.js"></script>
  <script src="js/print.js"></script>
  <script>document.addEventListener("DOMContentLoaded", function(){ if(typeof requireLogin==="function") requireLogin(); });</script>
</head>
<body>
<div id="page">
  <div class="page-head" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
    <div>
      <h1>سجلات الدفع</h1>
      <p>قسم الصندوق · قسم شام كاش · قسم الآجل</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="openAddPayment()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        تسجيل دفعة
      </button>
      <button class="btn btn-outline" onclick="exportLedger()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        تصدير
      </button>
    </div>
  </div>

  <!-- فلاتر البحث -->
  <div class="card" style="padding:14px 18px">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div class="field" style="margin:0;flex:1;min-width:140px">
        <label style="font-size:12px">النوع</label>
        <select class="input" id="filter-type" onchange="applyFilters()">
          <option value="">جميع الأنواع</option>
          <option value="cashier">صندوق</option>
          <option value="shamcash">شام كاش</option>
          <option value="credit">آجل</option>
        </select>
      </div>
      <div class="field" style="margin:0;flex:1;min-width:140px">
        <label style="font-size:12px">الحالة</label>
        <select class="input" id="filter-status" onchange="applyFilters()">
          <option value="">جميع الحالات</option>
          <option value="paid">مدفوع</option>
          <option value="pending">معلق</option>
          <option value="partial">جزئي</option>
        </select>
      </div>
      <div class="field" style="margin:0;flex:1;min-width:130px">
        <label style="font-size:12px">من تاريخ</label>
        <input class="input" type="date" id="filter-from" onchange="applyFilters()">
      </div>
      <div class="field" style="margin:0;flex:1;min-width:130px">
        <label style="font-size:12px">إلى تاريخ</label>
        <input class="input" type="date" id="filter-to" onchange="applyFilters()">
      </div>
      <div class="field" style="margin:0;flex:1;min-width:160px">
        <label style="font-size:12px">بحث</label>
        <input class="input" type="search" id="filter-search" placeholder="اسم، فاتورة، ملاحظة…" oninput="applyFilters()">
      </div>
      <button class="btn btn-outline btn-sm" onclick="clearFilters()">مسح الفلاتر</button>
    </div>
  </div>

  <!-- بطاقات الإجمالي -->
  <div class="stats-grid">
    <div class="stat-card" style="border-right:4px solid #10b981">
      <div class="stat-label">إجمالي الصندوق</div>
      <div class="stat-val" id="total-cashier" style="color:#10b981">0</div>
    </div>
    <div class="stat-card" style="border-right:4px solid #3b82f6">
      <div class="stat-label">إجمالي شام كاش</div>
      <div class="stat-val" id="total-shamcash" style="color:#3b82f6">0</div>
    </div>
    <div class="stat-card" style="border-right:4px solid #f59e0b">
      <div class="stat-label">إجمالي الآجل</div>
      <div class="stat-val" id="total-credit" style="color:#f59e0b">0</div>
    </div>
    <div class="stat-card" style="border-right:4px solid var(--primary)">
      <div class="stat-label">إجمالي الكل</div>
      <div class="stat-val" id="total-all">0</div>
    </div>
  </div>

  <!-- جدول التبويبات -->
  <div class="card" style="padding:0">
    <div style="display:flex;border-bottom:2px solid var(--border,#e5e7eb)">
      <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">
        الكل <span class="nav-badge" id="count-all">0</span>
      </button>
      <button class="tab-btn" id="tab-cashier" onclick="switchTab('cashier')">
        <span style="color:#10b981">◉</span> الصندوق <span class="nav-badge" id="count-cashier">0</span>
      </button>
      <button class="tab-btn" id="tab-shamcash" onclick="switchTab('shamcash')">
        <span style="color:#3b82f6">◉</span> شام كاش <span class="nav-badge" id="count-shamcash">0</span>
      </button>
      <button class="tab-btn" id="tab-credit" onclick="switchTab('credit')">
        <span style="color:#f59e0b">◉</span> الآجل <span class="nav-badge" id="count-credit">0</span>
      </button>
    </div>

    <div style="padding:0">
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>النوع</th>
              <th>التاريخ</th>
              <th>المبلغ</th>
              <th>الاسم / العميل</th>
              <th>رقم الفاتورة</th>
              <th>الحالة</th>
              <th>ملاحظات</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="ledger-body">
            <tr><td colspan="9" style="text-align:center;color:#aaa;padding:30px">جارٍ التحميل…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- نافذة إضافة دفعة -->
<div class="modal-overlay" id="payment-modal">
  <div class="modal" style="max-width:480px">
    <h3 id="pay-modal-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      تسجيل دفعة
    </h3>
    <input type="hidden" id="pay-edit-id">
    <div class="form-row">
      <div class="field">
        <label>نوع الدفع *</label>
        <select class="input" id="pay-type" onchange="onPayTypeChange()">
          <option value="cashier">صندوق (نقدي)</option>
          <option value="shamcash">شام كاش (إلكتروني)</option>
          <option value="credit">آجل (مديونية)</option>
        </select>
      </div>
      <div class="field">
        <label>الحالة *</label>
        <select class="input" id="pay-status">
          <option value="paid">مدفوع</option>
          <option value="pending">معلق</option>
          <option value="partial">جزئي</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>المبلغ (USD) *</label>
        <input class="input" type="number" id="pay-amount" step="0.01" min="0" placeholder="0.00" style="direction:ltr">
      </div>
      <div class="field">
        <label>التاريخ *</label>
        <input class="input" type="date" id="pay-date">
      </div>
    </div>
    <div class="field">
      <label>الاسم / العميل</label>
      <input class="input" id="pay-name" placeholder="اسم العميل أو الجهة الدافعة">
    </div>
    <div class="field">
      <label>رقم الفاتورة (اختياري)</label>
      <input class="input" id="pay-invoice" placeholder="WB-20241201-1" style="direction:ltr">
    </div>
    <div class="field" id="credit-due-field" style="display:none">
      <label>تاريخ الاستحقاق (للآجل)</label>
      <input class="input" type="date" id="pay-due-date">
    </div>
    <div class="field">
      <label>ملاحظات</label>
      <textarea class="input" id="pay-notes" rows="2" placeholder="أي تفاصيل إضافية…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="savePayment()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        حفظ
      </button>
      <button class="btn btn-outline" onclick="closeModal('payment-modal')">إلغاء</button>
    </div>
  </div>
</div>

<style>
.tab-btn {
  padding: 12px 20px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted, #6b7280);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .2s;
}
.tab-btn.active {
  color: var(--primary, #F57C20);
  border-bottom-color: var(--primary, #F57C20);
  background: rgba(245,124,32,.05);
}
.tab-btn:hover:not(.active) { color: var(--text, #111); background: var(--bg-hover, #f3f4f6); }
</style>

<script>
  renderLayout("payments-ledger");

  var LEDGER_KEY = "pos_payments_ledger";
  var _currentTab = "all";
  var _allPayments = [];

  function getLedger() {
    try { return JSON.parse(localStorage.getItem(LEDGER_KEY) || "[]"); } catch(e) { return []; }
  }
  function saveLedger(d) { localStorage.setItem(LEDGER_KEY, JSON.stringify(d)); }

  /* ─── مزامنة مع السحابة ─── */
  async function syncLedgerFromCloud() {
    if (typeof sbReady !== "function") return;
    if (!await sbReady()) return;
    try {
      var r = await SB.from("payments_ledger").select("*").order("date", { ascending: false });
      if (!r.error && r.data && r.data.length > 0) {
        var mapped = r.data.map(function(p) {
          return {
            id: String(p.id), type: p.type, date: p.date, amount: Number(p.amount || 0),
            name: p.name || "", invoiceNumber: p.invoice_number || "",
            status: p.status || "paid", notes: p.notes || "", dueDate: p.due_date || "",
            createdAt: p.created_at || ""
          };
        });
        saveLedger(mapped);
        return mapped;
      }
    } catch(e) {}
    return null;
  }

  async function addPaymentToCloud(p) {
    if (typeof sbReady !== "function" || !await sbReady()) return;
    try {
      await SB.from("payments_ledger").insert([{
        type: p.type, date: p.date, amount: p.amount,
        name: p.name || "", invoice_number: p.invoiceNumber || "",
        status: p.status, notes: p.notes || "", due_date: p.dueDate || ""
      }]);
    } catch(e) {}
  }

  async function deletePaymentFromCloud(id) {
    if (typeof sbReady !== "function" || !await sbReady()) return;
    try { var nid = Number(id); if (!isNaN(nid) && nid > 0) await SB.from("payments_ledger").delete().eq("id", nid); } catch(e) {}
  }

  /* ─── عرض الجدول ─── */
  function renderTable(payments) {
    _allPayments = payments;
    applyFilters();
  }

  function applyFilters() {
    var typeF   = document.getElementById("filter-type").value;
    var statusF = document.getElementById("filter-status").value;
    var fromF   = document.getElementById("filter-from").value;
    var toF     = document.getElementById("filter-to").value;
    var searchF = (document.getElementById("filter-search").value || "").toLowerCase();
    var tabFilter = _currentTab === "all" ? "" : _currentTab;

    var filtered = _allPayments.filter(function(p) {
      if (tabFilter && p.type !== tabFilter) return false;
      if (typeF && p.type !== typeF) return false;
      if (statusF && p.status !== statusF) return false;
      if (fromF && p.date < fromF) return false;
      if (toF && p.date > toF) return false;
      if (searchF) {
        var haystack = ((p.name || "") + " " + (p.invoiceNumber || "") + " " + (p.notes || "")).toLowerCase();
        if (haystack.indexOf(searchF) < 0) return false;
      }
      return true;
    });

    updateSummaryCards(filtered);
    updateCounts();

    var tbody = document.getElementById("ledger-body");
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#aaa;padding:30px">لا توجد سجلات مطابقة</td></tr>';
      return;
    }

    var typeColors = { cashier: "#10b981", shamcash: "#3b82f6", credit: "#f59e0b" };
    var typeLabels = { cashier: "صندوق", shamcash: "شام كاش", credit: "آجل" };
    var statusColors = { paid: "#065f46", pending: "#92400e", partial: "#1d4ed8" };
    var statusBg    = { paid: "#d1fae5", pending: "#fef3c7", partial: "#dbeafe" };
    var statusLabels = { paid: "مدفوع", pending: "معلق", partial: "جزئي" };

    var html = "";
    filtered.forEach(function(p, i) {
      var tc = typeColors[p.type] || "#6b7280";
      var tl = typeLabels[p.type] || p.type;
      var sc = statusColors[p.status] || "#6b7280";
      var sb = statusBg[p.status] || "#f3f4f6";
      var sl = statusLabels[p.status] || p.status;
      html +=
        "<tr>" +
        "<td style='color:#9ca3af;font-size:12px'>" + (i + 1) + "</td>" +
        "<td><span style='background:" + tc + "20;color:" + tc + ";padding:2px 8px;border-radius:12px;font-size:12px;font-weight:700'>" + tl + "</span></td>" +
        "<td>" + (p.date ? new Date(p.date).toLocaleDateString("ar") : "—") + "</td>" +
        "<td class='fw-bold'>" + (typeof formatPrice === "function" ? formatPrice(p.amount) : p.amount.toFixed(2)) + "</td>" +
        "<td>" + esc(p.name || "—") + "</td>" +
        "<td style='direction:ltr;font-size:12px'>" + esc(p.invoiceNumber || "—") + "</td>" +
        "<td><span style='background:" + sb + ";color:" + sc + ";padding:2px 8px;border-radius:12px;font-size:12px;font-weight:700'>" + sl + "</span></td>" +
        "<td style='font-size:12px;color:var(--text-muted,#6b7280)'>" + esc(p.notes ? p.notes.slice(0,40) + (p.notes.length>40?"…":"") : "—") + "</td>" +
        "<td style='white-space:nowrap'>" +
        "<button class='btn btn-outline btn-sm' onclick=\"editPayment('" + esc(String(p.id)) + "')\" style='margin-left:4px'>تعديل</button>" +
        "<button class='btn btn-danger btn-sm' onclick=\"deletePayment('" + esc(String(p.id)) + "')\">حذف</button>" +
        "</td>" +
        "</tr>";
    });
    tbody.innerHTML = html;
  }

  function updateSummaryCards(payments) {
    var totals = { cashier: 0, shamcash: 0, credit: 0, all: 0 };
    payments.forEach(function(p) { totals[p.type] = (totals[p.type] || 0) + Number(p.amount || 0); totals.all += Number(p.amount || 0); });
    var fmt = typeof formatPrice === "function" ? formatPrice : function(v) { return v.toFixed(2) + " $"; };
    document.getElementById("total-cashier").textContent = fmt(totals.cashier);
    document.getElementById("total-shamcash").textContent = fmt(totals.shamcash);
    document.getElementById("total-credit").textContent = fmt(totals.credit);
    document.getElementById("total-all").textContent = fmt(totals.all);
  }

  function updateCounts() {
    var all = _allPayments;
    document.getElementById("count-all").textContent = all.length;
    document.getElementById("count-cashier").textContent = all.filter(function(p){return p.type==="cashier";}).length;
    document.getElementById("count-shamcash").textContent = all.filter(function(p){return p.type==="shamcash";}).length;
    document.getElementById("count-credit").textContent = all.filter(function(p){return p.type==="credit";}).length;
  }

  function switchTab(tab) {
    _currentTab = tab;
    ["all","cashier","shamcash","credit"].forEach(function(t) {
      var el = document.getElementById("tab-" + t);
      if (el) el.classList.toggle("active", t === tab);
    });
    document.getElementById("filter-type").value = tab === "all" ? "" : tab;
    applyFilters();
  }

  function clearFilters() {
    document.getElementById("filter-type").value = "";
    document.getElementById("filter-status").value = "";
    document.getElementById("filter-from").value = "";
    document.getElementById("filter-to").value = "";
    document.getElementById("filter-search").value = "";
    _currentTab = "all";
    ["all","cashier","shamcash","credit"].forEach(function(t) {
      var el = document.getElementById("tab-" + t);
      if (el) el.classList.toggle("active", t === "all");
    });
    applyFilters();
  }

  /* ─── نافذة الإضافة ─── */
  function openAddPayment() {
    document.getElementById("pay-edit-id").value = "";
    document.getElementById("pay-modal-title").innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> تسجيل دفعة';
    document.getElementById("pay-type").value = "cashier";
    document.getElementById("pay-status").value = "paid";
    document.getElementById("pay-amount").value = "";
    document.getElementById("pay-date").value = new Date().toISOString().slice(0, 10);
    document.getElementById("pay-name").value = "";
    document.getElementById("pay-invoice").value = "";
    document.getElementById("pay-due-date").value = "";
    document.getElementById("pay-notes").value = "";
    onPayTypeChange();
    openModal("payment-modal");
  }

  function editPayment(id) {
    var p = getLedger().find(function(x) { return String(x.id) === String(id); });
    if (!p) return;
    document.getElementById("pay-edit-id").value = id;
    document.getElementById("pay-modal-title").textContent = "تعديل دفعة";
    document.getElementById("pay-type").value = p.type || "cashier";
    document.getElementById("pay-status").value = p.status || "paid";
    document.getElementById("pay-amount").value = p.amount || "";
    document.getElementById("pay-date").value = p.date || "";
    document.getElementById("pay-name").value = p.name || "";
    document.getElementById("pay-invoice").value = p.invoiceNumber || "";
    document.getElementById("pay-due-date").value = p.dueDate || "";
    document.getElementById("pay-notes").value = p.notes || "";
    onPayTypeChange();
    openModal("payment-modal");
  }

  function onPayTypeChange() {
    var type = document.getElementById("pay-type").value;
    var creditField = document.getElementById("credit-due-field");
    if (creditField) creditField.style.display = (type === "credit") ? "" : "none";
    if (type === "credit") {
      document.getElementById("pay-status").value = "pending";
    }
  }

  async function savePayment() {
    var amount = parseFloat(document.getElementById("pay-amount").value);
    var date   = document.getElementById("pay-date").value;
    var type   = document.getElementById("pay-type").value;
    if (!amount || amount <= 0) { toast("المبلغ مطلوب وأكبر من صفر", "error"); return; }
    if (!date) { toast("التاريخ مطلوب", "error"); return; }
    var id = document.getElementById("pay-edit-id").value;
    var p = {
      type: type,
      date: date,
      amount: amount,
      name: document.getElementById("pay-name").value.trim(),
      invoiceNumber: document.getElementById("pay-invoice").value.trim(),
      status: document.getElementById("pay-status").value,
      notes: document.getElementById("pay-notes").value.trim(),
      dueDate: type === "credit" ? document.getElementById("pay-due-date").value : ""
    };
    var list = getLedger();
    if (id) {
      for (var i = 0; i < list.length; i++) if (String(list[i].id) === String(id)) list[i] = Object.assign({}, list[i], p);
      saveLedger(list);
      toast("✓ تم تحديث الدفعة", "success");
    } else {
      p.id = Date.now().toString();
      p.createdAt = new Date().toISOString();
      list.unshift(p);
      saveLedger(list);
      addPaymentToCloud(p);
      if (typeof logActivity === "function") {
        var typeLbl = { cashier: "صندوق", shamcash: "شام كاش", credit: "آجل" };
        logActivity("payment", "دفعة " + (typeLbl[type] || type) + ": " + (p.name || "—"), "المبلغ: " + p.amount + " USD — " + p.status);
      }
      toast("✓ تم تسجيل الدفعة", "success");
    }
    closeModal("payment-modal");
    renderTable(getLedger());
  }

  async function deletePayment(id) {
    if (!confirm("هل تريد حذف هذا السجل؟")) return;
    var list = getLedger();
    saveLedger(list.filter(function(p) { return String(p.id) !== String(id); }));
    deletePaymentFromCloud(id);
    toast("تم حذف السجل", "success");
    renderTable(getLedger());
  }

  /* ─── تصدير ─── */
  function exportLedger() {
    var data = getLedger();
    var csv = "النوع,التاريخ,المبلغ,الاسم,الفاتورة,الحالة,ملاحظات\n";
    var typeLabels = { cashier: "صندوق", shamcash: "شام كاش", credit: "آجل" };
    var statusLabels = { paid: "مدفوع", pending: "معلق", partial: "جزئي" };
    data.forEach(function(p) {
      csv += [typeLabels[p.type]||p.type, p.date, p.amount, p.name||"", p.invoiceNumber||"", statusLabels[p.status]||p.status, (p.notes||"").replace(/,/g,"؛")].join(",") + "\n";
    });
    var blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "سجلات-الدفع-" + new Date().toISOString().slice(0, 10) + ".csv";
    a.click();
    toast("✓ تم تصدير السجلات", "success");
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  /* ─── التهيئة ─── */
  (async function init() {
    var fromCloud = await syncLedgerFromCloud();
    var payments = fromCloud || getLedger();

    /* دمج الفواتير الآجلة التلقائياً في أول تشغيل */
    if (payments.length === 0 || !localStorage.getItem("pos_ledger_seeded")) {
      try {
        if (typeof getInvoices === "function") {
          var invs = await getInvoices();
          var creditInvs = invs.filter(function(inv) { return inv.paymentStatus && inv.paymentStatus.indexOf("آجل") >= 0; });
          var existing = payments.map(function(p) { return p.invoiceNumber; });
          creditInvs.forEach(function(inv) {
            if (existing.indexOf(inv.invoiceNumber) < 0) {
              payments.push({
                id: "seed_" + inv.invoiceNumber,
                type: "credit",
                date: inv.date ? inv.date.slice(0,10) : new Date().toISOString().slice(0,10),
                amount: Number(inv.total || 0),
                name: inv.customer ? (inv.customer.name || inv.customer.phone || "") : "",
                invoiceNumber: inv.invoiceNumber,
                status: "pending",
                notes: "مستورد تلقائياً من سجل الفواتير",
                createdAt: new Date().toISOString()
              });
            }
          });
          saveLedger(payments);
          localStorage.setItem("pos_ledger_seeded", "1");
        }
      } catch(e) {}
    }

    renderTable(payments);
  })();
</script>
</body>
</html>
