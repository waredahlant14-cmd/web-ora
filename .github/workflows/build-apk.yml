name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: npm install
    
    - name: Build Android
      run: npx cap add android || true
      continue-on-error: true
    
    - name: Build APK
      run: npx cap sync android && npx cap build android --configuration ${{ github.event.inputs.build_type || 'debug' }}
    
    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WeB-Ora-POS-v5.2.5
        path: |
          **/*.apk
          !**/*.aab
