name: 🤖 Build Android APK — WeB Ora POS

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

jobs:
  build-apk:
    name: Build APK (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest

    steps:
      # ─── 1. استنساخ الكود ───────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ─── 2. إعداد Node.js ───────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. تثبيت الحزم ─────────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      # ─── 4. إعداد Java 17 ───────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 5. إعداد Android SDK ───────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── 6. إضافة Capacitor Android (إن لم يكن موجوداً) ────────
      - name: ➕ Capacitor add android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android folder already exists, skipping add"
          fi

      # ─── 7. مزامنة ملفات الويب مع Android ──────────────────────
      - name: 🔄 Capacitor sync
        run: npx cap sync android

      # ─── 8. منح صلاحيات Gradle ──────────────────────────────────
      - name: 🔑 Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ─── 9. بناء APK Debug ──────────────────────────────────────
      - name: 🔨 Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── 10. بناء APK Release (موقّع) ───────────────────────────
      - name: 🔏 Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        env:
          KEYSTORE_FILE:      ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "$KEYSTORE_FILE" | base64 -d > webora-pos.keystore
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/webora-pos.keystore \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              --no-daemon --stacktrace
          else
            echo "⚠️ No keystore — building unsigned release"
            ./gradlew assembleRelease --no-daemon --stacktrace
          fi

      # ─── 11. رفع APK كـ Artifact ─────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeB-Ora-POS-v${{ github.ref_name || '5.2.5' }}-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ─── 12. إرسال APK عبر Telegram ─────────────────────────────
      - name: 📱 Send APK via Telegram
        if: success()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BUILD=${{ github.event.inputs.build_type || 'debug' }}
          APK_FILE=$(find android/app/build/outputs/apk/$BUILD -name "*.apk" | head -1)
          if [ -f "$APK_FILE" ] && [ -n "$TELEGRAM_TOKEN" ]; then
            SIZE=$(du -sh "$APK_FILE" | cut -f1)
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document=@"$APK_FILE" \
              -F caption="✅ WeB Ora POS v5.2.5 — APK ${BUILD^^}
📦 الحجم: ${SIZE}
🔀 Commit: ${{ github.sha }}
📅 $(date '+%Y-%m-%d %H:%M')" \
              && echo "✅ APK sent to Telegram" \
              || echo "⚠️ Telegram send failed"
          else
            echo "Skipping Telegram: no APK or token"
          fi

      # ─── 13. إنشاء GitHub Release (عند tag) ─────────────────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          name: WeB Ora POS ${{ github.ref_name }}
          body: |
            ## 📱 WeB Ora POS ${{ github.ref_name }}

            ### الميزات الجديدة في v5.2.5
            - ✅ إدارة الفروع المتعددة
            - ✅ طباعة الفاتورة بـ 3 عملات (SYP / USD / TRY)
            - ✅ سجلات الدفع (صندوق / شام كاش / آجل)
            - ✅ اختصارات سطح المكتب
            - ✅ نقل إعداد النظام لصفحة الإعدادات
