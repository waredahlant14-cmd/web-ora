name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm install

    - name: Build web app
      run: |
        npm run build || echo "No build script"
        mkdir -p www
        echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>WeB Ora POS</title></head><body><h1>WeB Ora POS v5.2.5</h1><p>Loading...</p></body></html>' > www/index.html

    - name: Add Android platform
      run: npx cap add android || true

    - name: Build Debug APK
      run: |
        npx cap sync android
        cd android
        ./gradlew assembleDebug
        cd ..

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WeB-Ora-POS-v5.2.5
        path: android/app/build/outputs/apk/debug/*.apk
