name: 🚀 Release — WeB Ora POS

on:
  push:
    tags: [ 'v*.*.*' ]

jobs:
  release:
    name: Create Release & Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ➕ Capacitor add android
        run: |
          [ ! -d "android" ] && npx cap add android || echo "android exists"

      - name: 🔄 Capacitor sync
        run: npx cap sync android

      - name: 🔑 Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: 🔨 Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: WeB Ora POS ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            ## 📱 WeB Ora POS ${{ github.ref_name }}

            ### تحميل APK
            ⬇️ حمّل ملف `app-debug.apk` من الأسفل مباشرة

            ### الميزات
            - إدارة الفروع المتعددة
            - طباعة 3 عملات (SYP / USD / TRY)
            - سجلات الدفع (صندوق / شام كاش / آجل)
            - اختصارات سطح المكتب
            - الإصدار 5.2.5

      - name: 📱 Send via Telegram
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh "$APK" | cut -f1)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"$APK" \
            -F caption="🚀 WeB Ora POS ${{ github.ref_name }} — إصدار رسمي
📦 الحجم: ${SIZE}
📅 $(date '+%Y-%m-%d %H:%M')"
